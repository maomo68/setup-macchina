<html lang="it">
<head>
<meta charset="UTF-8">

<script>
const manifestData = {
  name: "Setup/Macchina R4", short_name: "R4",
  start_url: "./", display: "standalone",
  background_color: "#ddd8ce", theme_color: "#b86e00",
  orientation: "portrait",
  icons: [{ src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23ddd8ce'/><text y='55' x='50' text-anchor='middle' font-size='55' font-family='monospace' fill='%23b86e00'>⚙</text></svg>", sizes: "192x192", type: "image/svg+xml" }]
};
const blob = new Blob([JSON.stringify(manifestData)], {type:'application/json'});
const manifestURL = URL.createObjectURL(blob);
document.addEventListener('DOMContentLoaded', () => {
  const link = document.createElement('link'); link.rel='manifest'; link.href=manifestURL; document.head.appendChild(link);
});
</script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ddd8ce; --surface: #f0ece4; --surface2: #e6e1d8;
    --border: #b8b2a6; --accent: #b86e00; --green: #007a4a;
    --blue: #1a5fb4; --text: #1a1d23; --muted: #5a5650; --danger: #b02020;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; font-size: 15px; }

  header { background: var(--surface); border-bottom: 2px solid var(--accent); padding: 0 1.25rem; display: flex; align-items: center; gap: 0.75rem; height: 56px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 1rem; color: var(--accent); white-space: nowrap; }
  .logo span { color: var(--muted); font-weight: 400; }
  .nav { display: flex; gap: 0.25rem; flex: 1; padding-left: 0.5rem; }
  .nav-btn { background: none; border: none; color: var(--muted); font-family: 'IBM Plex Sans', sans-serif; font-size: 0.8rem; font-weight: 500; padding: 0.45rem 0.75rem; cursor: pointer; border-radius: 4px; transition: all 0.15s; white-space: nowrap; }
  .nav-btn:hover { color: var(--text); background: var(--surface2); }
  .nav-btn.active { color: var(--accent); background: rgba(184,110,0,0.1); }
  .badge { background: var(--accent); color: white; font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 0.75rem; padding: 0.1rem 0.45rem; border-radius: 2px; margin-left: auto; flex-shrink: 0; }
  .sync-indicator { display: flex; align-items: center; gap: 0.35rem; font-size: 0.68rem; color: var(--muted); flex-shrink: 0; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; flex-shrink: 0; transition: background 0.3s; }
  .sync-dot.ok { background: var(--green); }
  .sync-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
  .sync-dot.err { background: var(--danger); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .main { padding: 1.5rem 1.25rem; max-width: 900px; margin: 0 auto; }
  .view { display: none; }
  .view.active { display: block; }

  .toolbar { display: flex; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1.5px solid var(--border); color: var(--text); padding: 0.6rem 0.9rem 0.6rem 2.2rem; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.85rem; border-radius: 4px; }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon { position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); color: var(--muted); }

  .backup-bar { display: flex; align-items: center; gap: 0.6rem; background: var(--surface); border: 1.5px solid var(--border); border-radius: 6px; padding: 0.6rem 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .backup-label { font-size: 0.75rem; color: var(--muted); margin-right: auto; }
  .btn-backup { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; font-size: 0.75rem; padding: 0.45rem 0.9rem; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .btn-backup:hover { border-color: var(--accent); color: var(--accent); }

  .btn { font-family: 'IBM Plex Sans', sans-serif; font-weight: 600; font-size: 0.8rem; padding: 0.6rem 1.1rem; border: none; border-radius: 4px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.4rem; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #9a5c00; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: white; }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: #005a36; }

  .jobs-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .job-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 6px; overflow: hidden; transition: border-color 0.15s; }
  .job-card:hover { border-color: var(--accent); }
  .card-top { padding: 1rem 1.25rem 0.75rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; }
  .card-name { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 1.1rem; color: var(--accent); }
  .card-saved { font-size: 0.7rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; white-space: nowrap; }
  .card-stats { padding: 0 1.25rem 0.75rem; display: flex; gap: 1.5rem; flex-wrap: wrap; }
  .cstat { display: flex; flex-direction: column; gap: 0.1rem; }
  .cstat-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
  .cstat-val { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; color: var(--text); }
  .card-actions { padding: 0.6rem 1.25rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; justify-content: flex-end; background: var(--surface2); }

  .empty { text-align: center; padding: 4rem 1rem; color: var(--muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.4; }
  .empty-title { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; color: var(--text); opacity: 0.3; margin-bottom: 0.4rem; }

  .form-title-bar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .form-title { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 1.2rem; color: var(--accent); }

  .section { background: var(--surface); border: 1.5px solid var(--border); border-radius: 6px; padding: 1.25rem; margin-bottom: 1rem; }
  .section-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); font-weight: 600; margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }
  .fields-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.9rem; }
  .fields-grid.wide { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
  .field { display: flex; flex-direction: column; gap: 0.3rem; }
  .field.full { grid-column: 1/-1; }

  label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); font-weight: 500; }
  input[type="text"], input[type="number"], select, textarea {
    background: var(--bg); border: 1.5px solid var(--border); color: var(--text);
    padding: 0.55rem 0.75rem; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem;
    border-radius: 4px; width: 100%; transition: border-color 0.15s; -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); background: var(--surface2); }
  input::placeholder, textarea::placeholder { color: #aaa; }
  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  .enc-row { display: grid; grid-template-columns: 1fr auto; gap: 0.5rem; align-items: end; }
  .toggle-group { display: flex; border: 1.5px solid var(--border); border-radius: 4px; overflow: hidden; height: 36px; }
  .toggle-btn { flex: 1; background: none; border: none; color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.15s; padding: 0 0.6rem; }
  .toggle-btn.active { background: var(--accent); color: white; }
  .toggle-btn:not(.active):hover { background: var(--surface2); color: var(--text); }
  .big-toggle { display: flex; border: 1.5px solid var(--border); border-radius: 4px; overflow: hidden; width: 100%; height: 44px; }
  .big-toggle .toggle-btn { font-size: 0.85rem; }

  .form-actions { display: flex; justify-content: flex-end; gap: 0.75rem; padding-top: 1rem; flex-wrap: wrap; }

  .detail-hero { background: var(--surface); border: 1.5px solid var(--accent); border-radius: 6px; padding: 1.25rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
  .detail-name { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 1.6rem; color: var(--accent); }
  .detail-saved { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }
  .detail-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 600px) { .detail-grid { grid-template-columns: 1fr; } .fields-grid { grid-template-columns: 1fr 1fr; } }
  .detail-section { background: var(--surface); border: 1.5px solid var(--border); border-radius: 6px; padding: 1rem; }
  .detail-section.full { grid-column: 1/-1; }
  .detail-section-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 2.5px; color: var(--accent); font-weight: 600; margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .drow { display: flex; justify-content: space-between; align-items: baseline; padding: 0.4rem 0; border-bottom: 1px solid rgba(184,178,166,0.4); gap: 0.75rem; }
  .drow:last-child { border-bottom: none; }
  .dkey { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); flex-shrink: 0; }
  .dval { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; color: var(--text); text-align: right; }
  .dval.hi { color: var(--accent); font-weight: 700; }
  .badge-pill { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
  .badge-green { background: rgba(0,122,74,0.12); color: var(--green); border: 1px solid rgba(0,122,74,0.3); }
  .badge-blue { background: rgba(26,95,180,0.12); color: var(--blue); border: 1px solid rgba(26,95,180,0.3); }
  .notes-pre { font-family: 'IBM Plex Sans', sans-serif; font-size: 0.85rem; line-height: 1.6; white-space: pre-wrap; padding: 0.75rem; background: var(--bg); border-radius: 4px; border: 1px solid var(--border); }

  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: var(--surface); padding: 0.7rem 1.25rem; border-radius: 4px; font-size: 0.82rem; font-weight: 500; z-index: 999; transform: translateY(3rem); opacity: 0; transition: all 0.25s; border-left: 3px solid var(--green); box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.err { border-left-color: var(--danger); }

  @media print { header{display:none} .detail-actions{display:none} .backup-bar{display:none} body{background:white} .detail-hero,.detail-section{background:white;border-color:#ccc} }
</style>
</head>
<body>

<header>
  <div class="logo">SETUP<span>/</span>MACCHINA R4</div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showView('list')" id="nav-list">▤ Archivio</button>
    <button class="nav-btn" onclick="newJob()" id="nav-form">＋ Nuovo</button>

    <span id="sync-label"></span>

<div class="main">

  <!-- LIST -->
  <div class="view active" id="view-list">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>

      <button class="btn-backup" onclick="document.getElementById('import-file').click()">⬆ Importa</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importaBackup(this)">
    </div>
    <div class="jobs-list" id="jobs-list"></div>
  </div>

  <!-- FORM -->
  <div class="view" id="view-form">
    <div class="form-title-bar">
      <div class="form-title" id="form-title">// NUOVO SETUP</div>
    </div>

    <div class="section">
      <div class="section-label">Identificazione</div>
      <div class="fields-grid wide">
        <div class="field full"><label>Nome Lavoro *</label><input type="text" id="f-lavoro" placeholder="Es. Scatola Rossi 500pz"></div>
        <div class="field"><label>Altezza Carta (mm)</label><input type="number" step="any" id="f-altezza" placeholder="0"></div>
        <div class="field"><label>Formato (mm)</label><input type="number" step="any" id="f-formato" placeholder="0"></div>

      <div class="section-label">Parametri D</div>
      <div class="fields-grid">
        <div class="field"><label>D1</label><input type="number" step="any" id="f-d1"></div>
        <div class="field"><label>D2</label><input type="number" step="any" id="f-d2"></div>
        <div class="field"><label>D3</label><input type="number" step="any" id="f-d3"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Tagliolo & Cono</div>
      <div class="fields-grid">
        <div class="field"><label>Tagliolo Lato Operatore</label><input type="number" step="any" id="f-tag-op"></div>
        <div class="field"><label>Tagliolo Lato Motore</label><input type="number" step="any" id="f-tag-mot"></div>
        <div class="field"><label>Cono</label><input type="number" step="any" id="f-cono"></div>

    <div class="section">
      <div class="section-label">Encoder</div>
      <div class="fields-grid">
        <div class="field"><label>Encoder 1</label><div class="enc-row"><input type="number" step="any" id="f-enc1"><div class="toggle-group"><button class="toggle-btn active" id="enc1-int" onclick="setToggle('enc1','INT')">INT</button><button class="toggle-btn" id="enc1-ext" onclick="setToggle('enc1','EXT')">EXT</button></div></div></div>
        <div class="field"><label>Encoder 2</label><div class="enc-row"><input type="number" step="any" id="f-enc2"><div class="toggle-group"><button class="toggle-btn active" id="enc2-int" onclick="setToggle('enc2','INT')">INT</button><button class="toggle-btn" id="enc2-ext" onclick="setToggle('enc2','EXT')">EXT</button></div></div></div>
        <div class="field"><label>Encoder 3</label><div class="enc-row"><input type="number" step="any" id="f-enc3"><div class="toggle-group"><button class="toggle-btn active" id="enc3-int" onclick="setToggle('enc3','INT')">INT</button><button class="toggle-btn" id="enc3-ext" onclick="setToggle('enc3','EXT')">EXT</button></div></div></div>
      </div>

    <div class="section">
      <div class="section-label">Tipo Incollaggio</div>
      <div class="big-toggle">
        <button class="toggle-btn active" id="ac-acqua" onclick="setAcColla('ACQUA')">💧 ACQUA</button>

    <div class="section">
      <div class="section-label">Parametri A</div>
      <div class="fields-grid">
        <div class="field"><label>A1</label><input type="number" step="any" id="f-a1"></div>
        <div class="field"><label>A2</label><input type="number" step="any" id="f-a2"></div>
        <div class="field"><label>A3</label><input type="number" step="any" id="f-a3"></div>
        <div class="field"><label>A4</label><input type="number" step="any" id="f-a4"></div>
        <div class="field"><label>A5</label><input type="number" step="any" id="f-a5"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Silicone & Registro</div>
      <div class="fields-grid">
        <div class="field"><label>Silicone 1 Volta</label><input type="number" step="any" id="f-sil1"></div>
        <div class="field"><label>Silicone 2 Bianca</label><input type="number" step="any" id="f-sil2"></div>

  <!-- DETAIL -->

    <div id="detail-content"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ======= CONFIG =======
const BIN_ID = '69b49933aa77b81da9e1d2e7';
const API_KEY = '$2a$10$NzjVBO1ODnY3C0ak3q0Lye3CVJr4Zz3kuM.DgLOF2q5sKLEiXbp8.';
const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

// ======= STATE =======
let encState = {enc1:'INT',enc2:'INT',enc3:'INT'};
let acCollaState = 'ACQUA';
let editId = null;
let allJobs = [];

// ======= SYNC UI =======
function setSyncStatus(status, label) {
  document.getElementById('sync-dot').className = 'sync-dot ' + status;
  document.getElementById('sync-label').textContent = label;
}

// ======= CLOUD =======
async function loadFromCloud() {
  setSyncStatus('loading', 'Carico...');
  try {
    const res = await fetch(BIN_URL + '/latest', { headers: {'X-Master-Key': API_KEY} });
    if (!res.ok) throw new Error();
    const data = await res.json();
    const r = data.record;
    allJobs = Array.isArray(r) ? r : (r.jobs || []);
    document.getElementById('job-count').textContent = allJobs.length;
    setSyncStatus('ok', 'Sincronizzato');
    return true;
  } catch {
    setSyncStatus('err', 'Offline');
    return false;
  }
}

async function saveToCloud(jobs) {
  setSyncStatus('loading', 'Salvo...');
  try {
    const res = await fetch(BIN_URL, {
      method: 'PUT',
      headers: {'Content-Type':'application/json','X-Master-Key': API_KEY},
      body: JSON.stringify(jobs)
    });
    if (!res.ok) throw new Error();
    allJobs = jobs;
    document.getElementById('job-count').textContent = jobs.length;
    setSyncStatus('ok', 'Sincronizzato');
    return true;
  } catch {
    setSyncStatus('err', 'Errore salvataggio');
    return false;
  }
}

// Auto-refresh ogni 30 secondi
setInterval(async () => {
  await loadFromCloud();
  if (document.getElementById('view-list').classList.contains('active')) renderList();
}, 30000);

// ======= TOGGLES =======
function setToggle(enc, val) {
  encState[enc] = val;
  document.getElementById(enc+'-int').classList.toggle('active', val==='INT');
  document.getElementById(enc+'-ext').classList.toggle('active', val==='EXT');
}
function setAcColla(val) {
  acCollaState = val;
  document.getElementById('ac-acqua').classList.toggle('active', val==='ACQUA');
  document.getElementById('ac-colla').classList.toggle('active', val==='COLLA');
}

// ======= NAV =======
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('nav-list').classList.toggle('active', name==='list');
  document.getElementById('nav-form').classList.toggle('active', name==='form');
  if (name==='list') renderList();
}

// ======= FORM =======
function newJob() {
  editId = null;
  document.getElementById('form-title').textContent = '// NUOVO SETUP';
  clearForm();
  showView('form');
}

function clearForm() {
  ['f-lavoro','f-altezza','f-formato','f-d1','f-d2','f-d3',
   'f-tag-op','f-tag-mot','f-cono','f-enc1','f-enc2','f-enc3',
   'f-a1','f-a2','f-a3','f-a4','f-a5',
   'f-sil1','f-sil2','f-reg-volta','f-reg-bianca','f-note'
  ].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  encState = {enc1:'INT',enc2:'INT',enc3:'INT'};
  ['enc1','enc2','enc3'].forEach(e => setToggle(e,'INT'));
  setAcColla('ACQUA');
}

function g(id) { const el=document.getElementById(id); return el?el.value.trim():''; }

async function saveJob() {
  const lavoro = g('f-lavoro');
  if (!lavoro) { toast('Inserisci il nome del lavoro!', true); return; }
  const job = {
    id: editId || Date.now().toString(),
    savedAt: new Date().toISOString(),
    lavoro,
    altezza: g('f-altezza'), formato: g('f-formato'),
    d1: g('f-d1'), d2: g('f-d2'), d3: g('f-d3'),
    tagOp: g('f-tag-op'), tagMot: g('f-tag-mot'), cono: g('f-cono'),
    enc1: g('f-enc1'), enc1mode: encState.enc1,
    enc2: g('f-enc2'), enc2mode: encState.enc2,
    enc3: g('f-enc3'), enc3mode: encState.enc3,
    acColla: acCollaState,
    a1: g('f-a1'), a2: g('f-a2'), a3: g('f-a3'), a4: g('f-a4'), a5: g('f-a5'),
    sil1: g('f-sil1'), sil2: g('f-sil2'),
    regVolta: g('f-reg-volta'), regBianca: g('f-reg-bianca'),
    note: g('f-note')
  };
  let jobs = [...allJobs];
  if (editId) { const i=jobs.findIndex(j=>j.id===editId); if(i>=0) jobs[i]=job; else jobs.unshift(job); }
  else jobs.unshift(job);
  const ok = await saveToCloud(jobs);
  if (ok) { toast('✓ Setup salvato: '+lavoro); showView('list'); }
  else toast('Errore salvataggio — riprova!', true);
}

// ======= LIST =======
function renderList(filter='') {
  const q = filter.toLowerCase();
  const filtered = q ? allJobs.filter(j=>j.lavoro.toLowerCase().includes(q)) : allJobs;
  const el = document.getElementById('jobs-list');
  if (!filtered.length) {
    el.innerHTML=`<div class="empty"><div class="empty-icon">⚙</div><div class="empty-title">${q?'NESSUN RISULTATO':'NESSUN SETUP SALVATO'}</div><p style="font-size:0.8rem;margin-top:0.3rem">${q?'Prova con un altro termine.':'Crea il primo setup con "+ Nuovo"'}</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(j => {
    const dt = new Date(j.savedAt).toLocaleDateString('it-IT');
    const acBadge = j.acColla==='ACQUA' ? '💧 ACQUA' : '🔶 COLLA';
    return `<div class="job-card">
      <div class="card-top"><div class="card-name">${esc(j.lavoro)}</div><div class="card-saved">${dt}</div></div>
      <div class="card-stats">
        ${j.altezza?`<div class="cstat"><span class="cstat-label">Alt. Carta</span><span class="cstat-val">${j.altezza} mm</span></div>`:''}
        ${j.formato?`<div class="cstat"><span class="cstat-label">Formato</span><span class="cstat-val">${j.formato} mm</span></div>`:''}
        ${j.d1?`<div class="cstat"><span class="cstat-label">D1</span><span class="cstat-val">${esc(j.d1)}</span></div>`:''}
        ${j.d2?`<div class="cstat"><span class="cstat-label">D2</span><span class="cstat-val">${esc(j.d2)}</span></div>`:''}
        <div class="cstat"><span class="cstat-label">Tipo</span><span class="cstat-val">${acBadge}</span></div>
      </div>
      <div class="card-actions">
        <button class="btn btn-danger" onclick="event.stopPropagation();deleteJob('${j.id}')">Elimina</button>
        <button class="btn btn-secondary" onclick="editJob('${j.id}')">✏ Modifica</button>
        <button class="btn btn-green" onclick="viewJob('${j.id}')">▶ Carica</button>
      </div>
    </div>`;
  }).join('');
}

function filterJobs(q) { renderList(q); }

// ======= DETAIL =======

  if (!j) return;
  const dt = new Date(j.savedAt).toLocaleString('it-IT');
  const acBadge = j.acColla==='ACQUA'
    ? `<span class="badge-pill badge-blue">💧 ACQUA</span>`
    : `<span class="badge-pill badge-green">🔶 COLLA</span>`;
  const row = (k,v,hi) => v?`<div class="drow"><span class="dkey">${k}</span><span class="dval${hi?' hi':''}">${esc(String(v))}</span></div>`:'';
  const encRow = (k,val,mode) => `<div class="drow"><span class="dkey">${k}</span><span class="dval">${val?esc(String(val))+' ':''}<span class="badge-pill ${mode==='INT'?'badge-green':'badge-blue'}" style="font-size:0.65rem">${mode}</span></span></div>`;

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero">
      <div><div class="detail-name">${esc(j.lavoro)}</div><div class="detail-saved">Salvato: ${dt}</div></div>
      <div>${acBadge}</div>
    </div>
    <div class="detail-actions">
      <button class="btn btn-primary" onclick="window.print()">🖨 Stampa</button>
      <button class="btn btn-secondary" onclick="editJob('${id}')">✏ Modifica</button>
      <button class="btn btn-secondary" onclick="showView('list')">← Archivio</button>
      <button class="btn btn-danger" onclick="deleteJob('${id}')">🗑 Elimina</button>
    </div>
    <div class="detail-grid">
      <div class="detail-section">
        <div class="detail-section-label">Misure</div>
        ${row('Altezza Carta', j.altezza?j.altezza+' mm':'', true)}
        ${row('Formato', j.formato?j.formato+' mm':'', true)}
      </div>
      <div class="detail-section">
        <div class="detail-section-label">Parametri D</div>
        ${row('D1',j.d1)} ${row('D2',j.d2)} ${row('D3',j.d3)}
      </div>
      <div class="detail-section">
        <div class="detail-section-label">Tagliolo & Cono</div>
        ${row('Tagliolo Lato Op.',j.tagOp)} ${row('Tagliolo Lato Mot.',j.tagMot)} ${row('Cono',j.cono)}
      </div>
      <div class="detail-section">
        <div class="detail-section-label">Encoder</div>
        ${encRow('Encoder 1',j.enc1,j.enc1mode||'INT')}
        ${encRow('Encoder 2',j.enc2,j.enc2mode||'INT')}
        ${encRow('Encoder 3',j.enc3,j.enc3mode||'INT')}
      </div>
      <div class="detail-section">
        <div class="detail-section-label">Tipo Incollaggio</div>
        <div style="padding:0.6rem 0">${acBadge}</div>
      </div>
      <div class="detail-section">
        <div class="detail-section-label">Parametri A</div>
        ${row('A1',j.a1)} ${row('A2',j.a2)} ${row('A3',j.a3)} ${row('A4',j.a4)} ${row('A5',j.a5)}
      </div>
      <div class="detail-section full">
        <div class="detail-section-label">Silicone & Registro</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0">
          ${row('Silicone 1 Volta',j.sil1)} ${row('Silicone 2 Bianca',j.sil2)}
          ${row('Registro Volta',j.regVolta)} ${row('Registro Bianca',j.regBianca)}
        </div>
      </div>
      ${j.note?`<div class="detail-section full"><div class="detail-section-label">Note</div><div class="notes-pre">${esc(j.note)}</div></div>`:''}
    </div>`;
  showView('detail');
}

// ======= EDIT =======
function editJob(id) {
  const j = allJobs.find(x=>x.id===id); if (!j) return;
  editId = id;
  document.getElementById('form-title').textContent = '// MODIFICA SETUP';
  clearForm();
  const s=(elId,val)=>{const el=document.getElementById(elId);if(el)el.value=val||'';};
  s('f-lavoro',j.lavoro); s('f-altezza',j.altezza); s('f-formato',j.formato);
  s('f-d1',j.d1); s('f-d2',j.d2); s('f-d3',j.d3);
  s('f-tag-op',j.tagOp); s('f-tag-mot',j.tagMot); s('f-cono',j.cono);
  s('f-enc1',j.enc1); s('f-enc2',j.enc2); s('f-enc3',j.enc3);
  s('f-a1',j.a1); s('f-a2',j.a2); s('f-a3',j.a3); s('f-a4',j.a4); s('f-a5',j.a5);
  s('f-sil1',j.sil1); s('f-sil2',j.sil2);
  s('f-reg-volta',j.regVolta); s('f-reg-bianca',j.regBianca); s('f-note',j.note);
  setToggle('enc1',j.enc1mode||'INT'); setToggle('enc2',j.enc2mode||'INT'); setToggle('enc3',j.enc3mode||'INT');
  setAcColla(j.acColla||'ACQUA');
  showView('form');
}

// ======= DELETE =======
async function deleteJob(id) {
  const j = allJobs.find(x=>x.id===id); if (!j) return;
  if (!confirm('Eliminare "'+j.lavoro+'"?')) return;
  const ok = await saveToCloud(allJobs.filter(x=>x.id!==id));
  if (ok) { toast('Lavoro eliminato'); showView('list'); }
  else toast('Errore eliminazione!', true);
}

// ======= BACKUP LOCALE =======
function esportaBackup() {
  if (!allJobs.length) { toast('Nessun dato da esportare!', true); return; }
  const data = JSON.stringify({version:1, exportedAt:new Date().toISOString(), jobs:allJobs}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='backup-setup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✓ Backup esportato ('+allJobs.length+' lavori)');
}

function importaBackup(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async function(e) {
    try {
      const parsed=JSON.parse(e.target.result);
      const jobs=parsed.jobs||parsed;
      if(!Array.isArray(jobs)) throw new Error();
      if(confirm('Importare '+jobs.length+' lavori?\nOK = Sostituisce tutto\nAnnulla = Unisce con esistenti')) {
        await saveToCloud(jobs);
      } else {
        const ids=new Set(allJobs.map(j=>j.id));
        await saveToCloud([...allJobs,...jobs.filter(j=>!ids.has(j.id))]);
      }
      toast('✓ Backup importato'); renderList();
    } catch { toast('File non valido!', true); }
    input.value='';
  };
  reader.readAsText(file);
}

// ======= UTILS =======
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toast(msg, err) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast'+(err?' err':'');
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2800);
}

// ======= INIT =======
(async()=>{
  setSyncStatus('loading','Connessione...');
  await loadFromCloud();
  renderList();
})();
