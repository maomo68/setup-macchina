<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Setup/Macchina R4</title>

<!-- PWA: si apre come vera app su iPhone e Android -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Setup Macchina">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1d23">

<script>
// Registra il manifest inline per Android
const manifestData = {
  name: "Setup Macchina",
  short_name: "Setup",
  start_url: "./",
  display: "standalone",
  background_color: "#1a1d23",
  theme_color: "#f0a500",
  orientation: "portrait",
  icons: [{
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%231a1d23'/><text y='55' x='50' text-anchor='middle' font-size='55' font-family='monospace' fill='%23f0a500'>⚙</text></svg>",
    sizes: "192x192",
    type: "image/svg+xml"
  }]
};
const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(blob);
document.addEventListener('DOMContentLoaded', () => {
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = manifestURL;
  document.head.appendChild(link);
});
</script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ddd8ce;
    --surface: #f0ece4;
    --surface2: #e6e1d8;
    --border: #b8b2a6;
    --accent: #b86e00;
    --accent2: #c04000;
    --green: #007a4a;
    --blue: #1a5fb4;
    --text: #1a1d23;
    --muted: #5a5650;
    --danger: #b02020;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    font-size: 15px;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 0 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .logo span { color: var(--muted); font-weight: 400; }

  .nav {
    display: flex;
    gap: 0.25rem;
    flex: 1;
    padding-left: 1rem;
  }

  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.45rem 0.9rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .nav-btn:hover { color: var(--text); background: var(--surface2); }
  .nav-btn.active { color: var(--accent); background: rgba(240,165,0,0.12); }

  .badge {
    background: var(--accent);
    color: #000;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 0.75rem;
    padding: 0.1rem 0.45rem;
    border-radius: 2px;
    margin-left: auto;
  }

  /* MAIN */
  .main { padding: 1.5rem 1.25rem; max-width: 900px; margin: 0 auto; }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* SEARCH BAR */
  .toolbar {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.9rem 0.6rem 2.2rem;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.85rem;
    border-radius: 4px;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute; left: 0.7rem; top: 50%;
    transform: translateY(-50%); color: var(--muted); font-size: 0.85rem;
  }

  /* BUTTONS */
  .btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    padding: 0.6rem 1.1rem;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #ffb820; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: transparent; color: var(--danger); border: 1.5px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: white; }
  .btn-green { background: var(--green); color: #000; }
  .btn-green:hover { background: #00e090; }

  /* JOB CARDS */
  .jobs-list { display: flex; flex-direction: column; gap: 0.75rem; }

  .job-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .job-card:hover { border-color: var(--accent); }

  .card-top {
    padding: 1rem 1.25rem 0.75rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
  }

  .card-name {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .card-saved {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
  }

  .card-stats {
    padding: 0 1.25rem 0.75rem;
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .cstat { display: flex; flex-direction: column; gap: 0.1rem; }
  .cstat-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); }
  .cstat-val { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; color: var(--text); }

  .card-actions {
    padding: 0.6rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
    background: var(--surface2);
  }

  .backup-bar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .backup-label {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-right: auto;
  }

  .btn-backup {
    background: var(--surface2);
    color: var(--text);
    border: 1.5px solid var(--border);
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    font-size: 0.75rem;
    padding: 0.45rem 0.9rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }
  .btn-backup:hover { border-color: var(--accent); color: var(--accent); }

  .empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.4; }
  .empty-title { font-family: 'IBM Plex Mono', monospace; font-size: 1rem; color: var(--text); opacity: 0.3; margin-bottom: 0.4rem; }

  /* FORM */
  .form-title-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .form-title {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 1.2rem;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .section {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .section-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
  }

  .fields-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0.9rem;
  }

  .fields-grid.wide {
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .field.full { grid-column: 1/-1; }

  label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    font-weight: 500;
  }

  input[type="text"],
  input[type="number"],
  select,
  textarea {
    background: var(--bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 0.55rem 0.75rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    border-radius: 4px;
    width: 100%;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface2);
  }
  input::placeholder, textarea::placeholder { color: #454c5e; }

  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  /* Toggle INT/EXT */
  .enc-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.5rem;
    align-items: end;
  }

  .toggle-group {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    height: 36px;
  }

  .toggle-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    padding: 0 0.6rem;
  }
  .toggle-btn.active { background: var(--accent); color: #000; }
  .toggle-btn:not(.active):hover { background: var(--surface2); color: var(--text); }

  /* Acqua/Colla toggle */
  .big-toggle {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    width: 100%;
    height: 40px;
  }
  .big-toggle .toggle-btn {
    font-size: 0.8rem;
    letter-spacing: 1.5px;
  }

  /* Form actions */
  .form-actions {
    display: flex;
    justify-content: flex-end;
    gap: 0.75rem;
    padding-top: 1rem;
    flex-wrap: wrap;
  }

  /* DETAIL */
  .detail-hero {
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .detail-name {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .detail-saved { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }

  .detail-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 1rem; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  @media (max-width: 600px) {
    .detail-grid { grid-template-columns: 1fr; }
    .fields-grid { grid-template-columns: 1fr 1fr; }
  }

  .detail-section {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
  }

  .detail-section.full { grid-column: 1/-1; }

  .detail-section-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }

  .drow {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.4rem 0;
    border-bottom: 1px solid rgba(53,58,71,0.5);
    gap: 0.75rem;
  }
  .drow:last-child { border-bottom: none; }

  .dkey {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    flex-shrink: 0;
  }

  .dval {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    color: var(--text);
    text-align: right;
  }

  .dval.highlight {
    color: var(--accent);
    font-weight: 700;
  }

  .badge-pill {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
  }
  .badge-green { background: rgba(0,194,122,0.15); color: var(--green); border: 1px solid rgba(0,194,122,0.3); }
  .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }

  .notes-pre {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
    padding: 0.5rem;
    background: var(--bg);
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    background: var(--surface2); color: var(--text);
    padding: 0.7rem 1.25rem;
    border-radius: 4px;
    font-size: 0.82rem;
    font-weight: 500;
    z-index: 999;
    transform: translateY(3rem); opacity: 0;
    transition: all 0.25s;
    border-left: 3px solid var(--green);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.err { border-left-color: var(--danger); }

  @media print {
    header { display: none; }
    .detail-actions { display: none; }
    body { background: white; color: black; }
    .detail-hero, .detail-section { background: white; border-color: #ccc; }
    .detail-name { color: #333; }
    .detail-section-label { color: #555; }
    .dkey { color: #666; }
    .dval { color: #111; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SETUP/MACCHINA R4<span></span></div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showView('list')" id="nav-list">▤ Archivio</button>
    <button class="nav-btn" onclick="newJob()" id="nav-form">＋ Nuovo</button>
  </nav>
  <div class="badge" id="job-count">0</div>
</header>

<div class="main">

  <!-- ===== LIST VIEW ===== -->
  <div class="view active" id="view-list">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Cerca lavoro…" oninput="filterJobs(this.value)">
      </div>
      <button class="btn btn-primary" onclick="newJob()">＋ Nuovo Setup</button>
    </div>
    <div class="backup-bar">
      <span class="backup-label">💾 Backup</span>
      <button class="btn btn-backup" onclick="esportaBackup()">⬇ Esporta</button>
      <button class="btn btn-backup" onclick="document.getElementById('import-file').click()">⬆ Importa</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importaBackup(this)">
    </div>
    <div class="jobs-list" id="jobs-list"></div>
  </div>

  <!-- ===== FORM VIEW ===== -->
  <div class="view" id="view-form">
    <div class="form-title-bar">
      <div class="form-title" id="form-title">// NUOVO SETUP</div>
    </div>

    <!-- Identificazione -->
    <div class="section">
      <div class="section-label">Identificazione</div>
      <div class="fields-grid wide">
        <div class="field full">
          <label>Nome Lavoro *</label>
          <input type="text" id="f-lavoro" placeholder="Es. Scatola Rossi 500pz">
        </div>
        <div class="field">
          <label>Altezza Carta (mm)</label>
          <input type="number" id="f-altezza" placeholder="0">
        </div>
        <div class="field">
          <label>Formato (mm)</label>
          <input type="number" id="f-formato" placeholder="0">
        </div>
      </div>
    </div>

    <!-- Parametri D -->
    <div class="section">
      <div class="section-label">Parametri D</div>
      <div class="fields-grid">
        <div class="field">
          <label>D1</label>
          <input type="number" step="any" id="f-d1" placeholder="">
        </div>
        <div class="field">
          <label>D2</label>
          <input type="number" step="any" id="f-d2" placeholder="">
        </div>
        <div class="field">
          <label>D3</label>
          <input type="number" step="any" id="f-d3" placeholder="">
        </div>
      </div>
    </div>

    <!-- Tagliolo & Cono -->
    <div class="section">
      <div class="section-label">Tagliolo & Cono</div>
      <div class="fields-grid">
        <div class="field">
          <label>Tagliolo Lato Operatore</label>
          <input type="number" step="any" id="f-tag-op" placeholder="">
        </div>
        <div class="field">
          <label>Tagliolo Lato Motore</label>
          <input type="number" step="any" id="f-tag-mot" placeholder="">
        </div>
        <div class="field">
          <label>Cono</label>
          <input type="number" step="any" id="f-cono" placeholder="">
        </div>
      </div>
    </div>

    <!-- Encoder -->
    <div class="section">
      <div class="section-label">Encoder</div>
      <div class="fields-grid">
        <div class="field">
          <label>Encoder 1</label>
          <div class="enc-row">
            <input type="number" step="any" id="f-enc1" placeholder="">
            <div class="toggle-group">
              <button class="toggle-btn active" id="enc1-int" onclick="setToggle('enc1','INT')">INT</button>
              <button class="toggle-btn" id="enc1-ext" onclick="setToggle('enc1','EXT')">EXT</button>
            </div>
          </div>
        </div>
        <div class="field">
          <label>Encoder 2</label>
          <div class="enc-row">
            <input type="number" step="any" id="f-enc2" placeholder="">
            <div class="toggle-group">
              <button class="toggle-btn active" id="enc2-int" onclick="setToggle('enc2','INT')">INT</button>
              <button class="toggle-btn" id="enc2-ext" onclick="setToggle('enc2','EXT')">EXT</button>
            </div>
          </div>
        </div>
        <div class="field">
          <label>Encoder 3</label>
          <div class="enc-row">
            <input type="number" step="any" id="f-enc3" placeholder="">
            <div class="toggle-group">
              <button class="toggle-btn active" id="enc3-int" onclick="setToggle('enc3','INT')">INT</button>
              <button class="toggle-btn" id="enc3-ext" onclick="setToggle('enc3','EXT')">EXT</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Acqua / Colla -->
    <div class="section">
      <div class="section-label">Tipo Incollaggio</div>
      <div class="big-toggle">
        <button class="toggle-btn active" id="ac-acqua" onclick="setAcColla('ACQUA')">💧 ACQUA</button>
        <button class="toggle-btn" id="ac-colla" onclick="setAcColla('COLLA')">🔶 COLLA</button>
      </div>
    </div>

    <!-- Parametri A -->
    <div class="section">
      <div class="section-label">Parametri A</div>
      <div class="fields-grid">
        <div class="field"><label>A1</label><input type="number" step="any" id="f-a1" placeholder=""></div>
        <div class="field"><label>A2</label><input type="number" step="any" id="f-a2" placeholder=""></div>
        <div class="field"><label>A3</label><input type="number" step="any" id="f-a3" placeholder=""></div>
        <div class="field"><label>A4</label><input type="number" step="any" id="f-a4" placeholder=""></div>
        <div class="field"><label>A5</label><input type="number" step="any" id="f-a5" placeholder=""></div>
      </div>
    </div>

    <!-- Silicone & Registro -->
    <div class="section">
      <div class="section-label">Silicone & Registro</div>
      <div class="fields-grid">
        <div class="field">
          <label>Silicone 1 Volta</label>
          <input type="number" step="any" id="f-sil1" placeholder="">
        </div>
        <div class="field">
          <label>Silicone 2 Bianca</label>
          <input type="number" step="any" id="f-sil2" placeholder="">
        </div>
        <div class="field">
          <label>Registro Volta</label>
          <input type="number" step="any" id="f-reg-volta" placeholder="">
        </div>
        <div class="field">
          <label>Registro Bianca</label>
          <input type="number" step="any" id="f-reg-bianca" placeholder="">
        </div>
      </div>
    </div>

    <!-- Note -->
    <div class="section">
      <div class="section-label">Note</div>
      <textarea id="f-note" placeholder="Istruzioni, avvertenze, osservazioni…"></textarea>
    </div>

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="showView('list')">Annulla</button>
      <button class="btn btn-primary" onclick="saveJob()">💾 Salva Setup</button>
    </div>
  </div>

  <!-- ===== DETAIL VIEW ===== -->
  <div class="view" id="view-detail">
    <div id="detail-content"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ======= STATE =======
const DB = 'sm_jobs_v1';
let encState = { enc1: 'INT', enc2: 'INT', enc3: 'INT' };
let acCollaState = 'ACQUA';
let editId = null;

// ======= DB =======
function loadDB() {
  try { return JSON.parse(localStorage.getItem(DB)) || []; } catch { return []; }
}
function saveDB(jobs) {
  localStorage.setItem(DB, JSON.stringify(jobs));
  document.getElementById('job-count').textContent = jobs.length;
}
function initCount() {
  document.getElementById('job-count').textContent = loadDB().length;
}

// ======= TOGGLES =======
function setToggle(enc, val) {
  encState[enc] = val;
  const intBtn = document.getElementById(enc + '-int');
  const extBtn = document.getElementById(enc + '-ext');
  if (val === 'INT') {
    intBtn.classList.add('active'); extBtn.classList.remove('active');
  } else {
    extBtn.classList.add('active'); intBtn.classList.remove('active');
  }
}

function setAcColla(val) {
  acCollaState = val;
  document.getElementById('ac-acqua').classList.toggle('active', val === 'ACQUA');
  document.getElementById('ac-colla').classList.toggle('active', val === 'COLLA');
}

// ======= NAV =======
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.getElementById('nav-list').classList.toggle('active', name === 'list');
  document.getElementById('nav-form').classList.toggle('active', name === 'form');
  if (name === 'list') renderList();
}

// ======= FORM =======
function newJob() {
  editId = null;
  document.getElementById('form-title').textContent = '// NUOVO SETUP';
  clearForm();
  showView('form');
}

function clearForm() {
  ['f-lavoro','f-altezza','f-formato',
   'f-d1','f-d2','f-d3',
   'f-tag-op','f-tag-mot','f-cono',
   'f-enc1','f-enc2','f-enc3',
   'f-a1','f-a2','f-a3','f-a4','f-a5',
   'f-sil1','f-sil2','f-reg-volta','f-reg-bianca','f-note'
  ].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  encState = { enc1: 'INT', enc2: 'INT', enc3: 'INT' };
  ['enc1','enc2','enc3'].forEach(e => setToggle(e, 'INT'));
  setAcColla('ACQUA');
}

function g(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }

function saveJob() {
  const lavoro = g('f-lavoro');
  if (!lavoro) { toast('Inserisci il nome del lavoro!', true); return; }

  const job = {
    id: editId || Date.now().toString(),
    savedAt: new Date().toISOString(),
    lavoro,
    altezza: g('f-altezza'),
    formato: g('f-formato'),
    d1: g('f-d1'), d2: g('f-d2'), d3: g('f-d3'),
    tagOp: g('f-tag-op'), tagMot: g('f-tag-mot'), cono: g('f-cono'),
    enc1: g('f-enc1'), enc1mode: encState.enc1,
    enc2: g('f-enc2'), enc2mode: encState.enc2,
    enc3: g('f-enc3'), enc3mode: encState.enc3,
    acColla: acCollaState,
    a1: g('f-a1'), a2: g('f-a2'), a3: g('f-a3'), a4: g('f-a4'), a5: g('f-a5'),
    sil1: g('f-sil1'), sil2: g('f-sil2'),
    regVolta: g('f-reg-volta'), regBianca: g('f-reg-bianca'),
    note: g('f-note')
  };

  const jobs = loadDB();
  if (editId) {
    const i = jobs.findIndex(j => j.id === editId);
    if (i >= 0) jobs[i] = job; else jobs.unshift(job);
  } else {
    jobs.unshift(job);
  }
  saveDB(jobs);
  toast('✓ Setup salvato: ' + lavoro);
  showView('list');
}

// ======= LIST =======
function renderList(filter = '') {
  const jobs = loadDB();
  const q = filter.toLowerCase();
  const filtered = q ? jobs.filter(j => j.lavoro.toLowerCase().includes(q)) : jobs;
  const el = document.getElementById('jobs-list');

  if (!filtered.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">⚙</div>
      <div class="empty-title">${q ? 'NESSUN RISULTATO' : 'NESSUN SETUP SALVATO'}</div>
      <p style="font-size:0.8rem;margin-top:0.3rem">${q ? 'Prova con un altro termine.' : 'Crea il primo setup con "+ Nuovo"'}</p>
    </div>`;
    return;
  }

  el.innerHTML = filtered.map(j => {
    const dt = new Date(j.savedAt).toLocaleDateString('it-IT');
    return `<div class="job-card">
      <div class="card-top">
        <div class="card-name">${esc(j.lavoro)}</div>
        <div class="card-saved">${dt}</div>
      </div>
      <div class="card-stats">
        ${j.altezza ? `<div class="cstat"><span class="cstat-label">Alt. Carta</span><span class="cstat-val">${j.altezza} mm</span></div>` : ''}
        ${j.formato ? `<div class="cstat"><span class="cstat-label">Formato</span><span class="cstat-val">${j.formato} mm</span></div>` : ''}
        ${j.d1 ? `<div class="cstat"><span class="cstat-label">D1</span><span class="cstat-val">${esc(j.d1)}</span></div>` : ''}
        ${j.d2 ? `<div class="cstat"><span class="cstat-label">D2</span><span class="cstat-val">${esc(j.d2)}</span></div>` : ''}
        <div class="cstat"><span class="cstat-label">Tipo</span><span class="cstat-val">${j.acColla}</span></div>
      </div>
      <div class="card-actions">
        <button class="btn btn-danger" onclick="event.stopPropagation();deleteJob('${j.id}')">Elimina</button>
        <button class="btn btn-secondary" onclick="editJob('${j.id}')">✏ Modifica</button>
        <button class="btn btn-green" onclick="viewJob('${j.id}')">▶ Carica</button>
      </div>
    </div>`;
  }).join('');
}

function filterJobs(q) { renderList(q); }

// ======= DETAIL =======
function viewJob(id) {
  const j = loadDB().find(x => x.id === id);
  if (!j) return;
  const dt = new Date(j.savedAt).toLocaleString('it-IT');
  const acBadge = j.acColla === 'ACQUA'
    ? `<span class="badge-pill badge-blue">💧 ACQUA</span>`
    : `<span class="badge-pill badge-green">🔶 COLLA</span>`;

  const row = (k, v, hi) => v ? `<div class="drow"><span class="dkey">${k}</span><span class="dval${hi?' highlight':''}">${esc(v)}</span></div>` : '';
  const encRow = (k, val, mode) => (val||mode) ? `<div class="drow"><span class="dkey">${k}</span><span class="dval">${val ? esc(val)+' ' : ''}<span class="badge-pill ${mode==='INT'?'badge-green':'badge-blue'}" style="font-size:0.65rem">${mode}</span></span></div>` : '';

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-hero">
      <div>
        <div class="detail-name">${esc(j.lavoro)}</div>
        <div class="detail-saved">Salvato: ${dt}</div>
      </div>
      <div>${acBadge}</div>
    </div>

    <div class="detail-actions">
      <button class="btn btn-primary" onclick="window.print()">🖨 Stampa</button>
      <button class="btn btn-secondary" onclick="editJob('${id}')">✏ Modifica</button>
      <button class="btn btn-secondary" onclick="showView('list')">← Archivio</button>
      <button class="btn btn-danger" onclick="deleteJob('${id}')">🗑 Elimina</button>
    </div>

    <div class="detail-grid">
      <div class="detail-section">
        <div class="detail-section-label">Misure</div>
        ${row('Altezza Carta', j.altezza ? j.altezza+' mm' : '', true)}
        ${row('Formato', j.formato ? j.formato+' mm' : '', true)}
      </div>

      <div class="detail-section">
        <div class="detail-section-label">Parametri D</div>
        ${row('D1', j.d1)}
        ${row('D2', j.d2)}
        ${row('D3', j.d3)}
      </div>

      <div class="detail-section">
        <div class="detail-section-label">Tagliolo & Cono</div>
        ${row('Tagliolo Lato Op.', j.tagOp)}
        ${row('Tagliolo Lato Mot.', j.tagMot)}
        ${row('Cono', j.cono)}
      </div>

      <div class="detail-section">
        <div class="detail-section-label">Encoder</div>
        ${encRow('Encoder 1', j.enc1, j.enc1mode)}
        ${encRow('Encoder 2', j.enc2, j.enc2mode)}
        ${encRow('Encoder 3', j.enc3, j.enc3mode)}
      </div>

      <div class="detail-section">
        <div class="detail-section-label">Parametri A</div>
        ${row('A1', j.a1)}
        ${row('A2', j.a2)}
        ${row('A3', j.a3)}
        ${row('A4', j.a4)}
        ${row('A5', j.a5)}
      </div>

      <div class="detail-section">
        <div class="detail-section-label">Silicone & Registro</div>
        ${row('Silicone 1 Volta', j.sil1)}
        ${row('Silicone 2 Bianca', j.sil2)}
        ${row('Registro Volta', j.regVolta)}
        ${row('Registro Bianca', j.regBianca)}
      </div>

      ${j.note ? `<div class="detail-section full">
        <div class="detail-section-label">Note</div>
        <div class="notes-pre">${esc(j.note)}</div>
      </div>` : ''}
    </div>
  `;
  showView('detail');
}

// ======= EDIT =======
function editJob(id) {
  const j = loadDB().find(x => x.id === id);
  if (!j) return;
  editId = id;
  document.getElementById('form-title').textContent = '// MODIFICA SETUP';
  clearForm();
  const s = (elId, val) => { const el = document.getElementById(elId); if (el) el.value = val||''; };
  s('f-lavoro', j.lavoro); s('f-altezza', j.altezza); s('f-formato', j.formato);
  s('f-d1', j.d1); s('f-d2', j.d2); s('f-d3', j.d3);
  s('f-tag-op', j.tagOp); s('f-tag-mot', j.tagMot); s('f-cono', j.cono);
  s('f-enc1', j.enc1); s('f-enc2', j.enc2); s('f-enc3', j.enc3);
  s('f-a1', j.a1); s('f-a2', j.a2); s('f-a3', j.a3); s('f-a4', j.a4); s('f-a5', j.a5);
  s('f-sil1', j.sil1); s('f-sil2', j.sil2);
  s('f-reg-volta', j.regVolta); s('f-reg-bianca', j.regBianca);
  s('f-note', j.note);
  setToggle('enc1', j.enc1mode||'INT');
  setToggle('enc2', j.enc2mode||'INT');
  setToggle('enc3', j.enc3mode||'INT');
  setAcColla(j.acColla||'ACQUA');
  showView('form');
}

// ======= DELETE =======
function deleteJob(id) {
  const j = loadDB().find(x => x.id === id);
  if (!j) return;
  if (!confirm('Eliminare "' + j.lavoro + '"?')) return;
  saveDB(loadDB().filter(x => x.id !== id));
  toast('Lavoro eliminato');
  showView('list');
}

// ======= BACKUP & RIPRISTINO =======
function esportaBackup() {
  const jobs = loadDB();
  if (!jobs.length) { toast('Nessun dato da esportare!', true); return; }
  const data = JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), jobs }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = 'backup-setup-macchina-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✓ Backup esportato (' + jobs.length + ' lavori)');
}

function importaBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      const jobs = parsed.jobs || parsed;
      if (!Array.isArray(jobs)) throw new Error('Formato non valido');
      const esistenti = loadDB().length;
      if (esistenti > 0) {
        if (!confirm('Hai già ' + esistenti + ' lavori salvati.\n\nScegli:\n• OK = Unisci (mantieni tutto)\n• Annulla = Sostituisci tutto')) {
          // Sostituisci
          saveDB(jobs);
          toast('✓ Backup ripristinato: ' + jobs.length + ' lavori');
          renderList();
          input.value = '';
          return;
        }
        // Unisci: evita duplicati per ID
        const existing = loadDB();
        const existingIds = new Set(existing.map(j => j.id));
        const nuovi = jobs.filter(j => !existingIds.has(j.id));
        saveDB([...existing, ...nuovi]);
        toast('✓ Uniti ' + nuovi.length + ' nuovi lavori');
      } else {
        saveDB(jobs);
        toast('✓ Backup ripristinato: ' + jobs.length + ' lavori');
      }
      renderList();
    } catch(err) {
      toast('❌ File non valido!', true);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

// ======= UTILS =======
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (err ? ' err' : '');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ======= INIT =======
initCount();
renderList();
</script>
</body>
</html>
